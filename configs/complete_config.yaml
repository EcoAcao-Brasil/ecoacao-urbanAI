# configs/complete_config.yaml
# UrbanAI Configuration
# Preprocess Landsat GeoTIFFs, train a ConvLSTM model, and output a predicted raster.

preprocessing:
  # Temporal range based on your available Landsat data
  start_year: 1985
  end_year: 2023
  interval: 2  # 1 = annual, 2 = biennial

  # Landsat satellite version for band mapping (5, 7, 8, or 9)
  landsat_version: 8

  # Tocantins Framework (IS/SS metrics)
  # Set enabled: true to include Impact Score and Severity Score as model channels.
  # When disabled, the model uses 5 channels: NDBI, NDVI, NDWI, NDBSI, LST.
  # When enabled, the model uses 7 channels: NDBI, NDVI, NDWI, NDBSI, LST, IS, SS.
  tocantins:
    enabled: false
    k_threshold: 1.5
    spatial_params:
      min_anomaly_size: 1
      agglutination_distance: 4
      morphology_kernel_size: 3
      connectivity: 2
    rf_params:
      n_estimators: 200
      max_depth: 25
      min_samples_split: 8
      min_samples_leaf: 4
      random_state: 42

model:
  # input_channels and output_channels are auto-configured from tocantins.enabled:
  #   tocantins disabled: 5 channels (NDBI, NDVI, NDWI, NDBSI, LST)
  #   tocantins enabled:  7 channels (NDBI, NDVI, NDWI, NDBSI, LST, IS, SS)
  # Override explicitly only if needed.
  input_channels: 5
  output_channels: 5
  hidden_dims: [64, 128, 256, 256, 128, 64]
  kernel_size: 3
  num_encoder_layers: 3
  num_decoder_layers: 3

training:
  epochs: 100
  batch_size: 8
  learning_rate: 0.001
  optimizer: adam  # adam, adamw, sgd

  train_val_split:
    method: temporal  # temporal, random, or manual
    train_ratio: 0.8

  sequence_length: 10
  prediction_horizon: 1

  normalization_method: zscore  # zscore, minmax, robust

  augmentation:
    enabled: true
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.5
    rotation_prob: 0.5
    noise_prob: 0.0
    noise_std: 0.01

  gradient_clip: 1.0
  gradient_accumulation_steps: 1  # Increase to reduce effective memory usage
  num_workers: 4

  early_stopping:
    enabled: true
    patience: 15

prediction:
  calculate_uncertainty: false
  mc_samples: 20  # Monte Carlo samples when calculate_uncertainty is true

logging:
  level: INFO

